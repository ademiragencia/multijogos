<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2048 • Mini-Jogos</title>
  <meta name="description" content="2048: deslize e combine os números até chegar à peça 2048." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔢</text></svg>" />
  <style>
    .stage { max-width: 420px; margin: 0 auto; position: relative; }
    .grid {
      position: relative;
      background: var(--bg-2);
      border-radius: 14px;
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 10px;
      aspect-ratio: 1;
      touch-action: none;
    }
    .cell { background: rgba(255,255,255,0.04); border-radius: 10px; }
    .tiles { position: absolute; inset: 10px; }
    .tile {
      position: absolute;
      display: grid;
      place-items: center;
      border-radius: 10px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      transition: transform 0.12s ease;
      will-change: transform;
    }
    .tile.new { animation: appear 0.16s ease; }
    .tile.merged { animation: bump 0.16s ease; }
    @keyframes appear { from { transform: scale(0); } to { transform: scale(1); } }
    @keyframes bump { 0% { transform: scale(1); } 50% { transform: scale(1.14); } 100% { transform: scale(1); } }

    .t2    { background:#3a3560; color:#eef1ff; }
    .t4    { background:#463f78; color:#eef1ff; }
    .t8    { background:#7c5cff; color:#fff; }
    .t16   { background:#6b4bff; color:#fff; }
    .t32   { background:#ff5c98; color:#fff; }
    .t64   { background:#ff3d7f; color:#fff; }
    .t128  { background:#22d3ee; color:#0d0b1f; font-size:0.9em; }
    .t256  { background:#12c2e0; color:#0d0b1f; font-size:0.9em; }
    .t512  { background:#34e0a1; color:#0d0b1f; font-size:0.9em; }
    .t1024 { background:#2bd48f; color:#0d0b1f; font-size:0.8em; }
    .t2048 { background:linear-gradient(135deg,#ffd54a,#ff9d00); color:#0d0b1f; font-size:0.8em; box-shadow:0 0 24px rgba(255,180,0,.6); }
    .tbig  { background:linear-gradient(135deg,#ffd54a,#ff5c98); color:#0d0b1f; font-size:0.75em; }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <div class="brand"><span class="logo">🔢</span><span>Mini<span class="grad">Jogos</span></span></div>
      <a class="back-link" href="index.html">&larr; Voltar ao arcade</a>
    </header>

    <div class="game-head">
      <h1>2048</h1>
      <p>Use as <strong>setas</strong> ou deslize. Combine números iguais para chegar a 2048!</p>
    </div>

    <div class="hud">
      <div class="stat"><span class="label">Pontos</span><span class="value" id="score">0</span></div>
      <div class="stat"><span class="label">Recorde</span><span class="value" id="best">0</span></div>
    </div>

    <div class="panel">
      <div class="stage">
        <div class="grid" id="grid">
          <div class="tiles" id="tiles"></div>
        </div>
        <div class="overlay" id="overlay">
          <div class="box">
            <h2 id="ovtitle"></h2>
            <p id="ovtext"></p>
            <button class="btn" id="ovBtn">Jogar de novo</button>
          </div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="btn" id="newBtn">Novo jogo</button>
      <a class="btn ghost" href="index.html">Outro jogo</a>
    </div>

    <footer class="foot"><p>Chegou a 2048? Continue jogando para bater seu recorde!</p></footer>
  </div>

  <script>
    const SIZE = 4;
    const tilesEl = document.getElementById('tiles');
    const gridEl = document.getElementById('grid');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const overlay = document.getElementById('overlay');
    const ovTitle = document.getElementById('ovtitle');
    const ovText = document.getElementById('ovtext');
    const BEST_KEY = 'minijogos.2048.best';

    let board, score, won, over;

    // cria as 16 células de fundo uma única vez
    for (let i = 0; i < SIZE * SIZE; i++) {
      const c = document.createElement('div');
      c.className = 'cell';
      gridEl.insertBefore(c, tilesEl);
    }

    bestEl.textContent = localStorage.getItem(BEST_KEY) || '0';

    function init() {
      board = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
      score = 0; won = false; over = false;
      scoreEl.textContent = '0';
      overlay.classList.remove('show');
      addRandom(); addRandom();
      render();
    }

    function empties() {
      const list = [];
      for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) if (!board[r][c]) list.push([r, c]);
      return list;
    }

    let spawn = null;

    function addRandom() {
      const e = empties();
      if (!e.length) return;
      const [r, c] = e[(Math.random() * e.length) | 0];
      board[r][c] = Math.random() < 0.9 ? 2 : 4;
      spawn = { r, c }; // posição para animação de surgimento
    }

    function cls(v) {
      if (v <= 1024) return 't' + v;
      if (v === 2048) return 't2048';
      return 'tbig';
    }

    function render(prev) {
      tilesEl.innerHTML = '';
      const gap = 10;
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const cell = board[r][c];
          if (!cell) continue;
          const v = typeof cell === 'object' ? cell.v : cell;
          const el = document.createElement('div');
          el.className = 'tile ' + cls(v);
          el.textContent = v;
          const size = `calc((100% - ${gap * 3}px) / 4)`;
          el.style.width = size;
          el.style.height = size;
          el.style.left = `calc((100% - ${gap * 3}px) / 4 * ${c} + ${gap * c}px)`;
          el.style.top = `calc((100% - ${gap * 3}px) / 4 * ${r} + ${gap * r}px)`;
          el.style.fontSize = el.style.fontSize || 'clamp(1.1rem, 6vw, 1.9rem)';
          if (spawn && spawn.r === r && spawn.c === c) el.classList.add('new');
          if (typeof cell === 'object' && cell.merged) el.classList.add('merged');
          tilesEl.appendChild(el);
        }
      }
      // limpa flags
      for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
        if (typeof board[r][c] === 'object') board[r][c] = board[r][c].v;
      }
      spawn = null;
    }

    function slide(row) {
      let arr = row.filter(x => x);
      let gained = 0;
      const merges = [];
      for (let i = 0; i < arr.length - 1; i++) {
        if (arr[i] === arr[i + 1]) {
          arr[i] *= 2; gained += arr[i];
          if (arr[i] === 2048) won = true;
          arr.splice(i + 1, 1);
          merges.push(i);
        }
      }
      while (arr.length < SIZE) arr.push(0);
      return { arr, gained, merges };
    }

    function move(dir) {
      if (over) return;
      const before = JSON.stringify(board);
      // rotaciona para tratar tudo como "esquerda"
      let rotated = rotateForDir(board, dir);
      let merged = [];
      for (let r = 0; r < SIZE; r++) {
        const { arr, gained, merges } = slide(rotated[r]);
        rotated[r] = arr.map((v, c) => ({ v, mergedHere: merges.includes(c) }));
        score += gained;
        merged.push(merges);
      }
      // desrotaciona
      let plain = rotated.map(row => row.map(o => o.v));
      board = rotateBack(plain, dir);
      const mergedFlags = rotateBack(rotated.map(row => row.map(o => o.mergedHere)), dir);

      if (before === JSON.stringify(board)) { return; }

      // marca merges no board
      for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
        if (board[r][c] && mergedFlags[r][c]) board[r][c] = { v: board[r][c], merged: true };
      }

      scoreEl.textContent = score;
      const best = parseInt(localStorage.getItem(BEST_KEY) || '0', 10);
      if (score > best) { localStorage.setItem(BEST_KEY, score); bestEl.textContent = score; }

      addRandom();
      render();

      if (won && !over) { finish('🎉 Você chegou a 2048!', 'Continue jogando para aumentar sua pontuação.', 'Continuar'); won = false; return; }
      if (!canMove()) { over = true; finish('😵 Fim de jogo', `Sem movimentos. Pontuação: ${score}.`, 'Jogar de novo'); }
    }

    function rotateForDir(b, dir) {
      // retorna cópia onde "deslizar à esquerda" corresponde à direção pedida
      let m = b.map(row => row.map(cell => typeof cell === 'object' ? cell.v : cell));
      if (dir === 'left') return m;
      if (dir === 'right') return m.map(r => r.slice().reverse());
      if (dir === 'up') return transpose(m);
      if (dir === 'down') return transpose(m).map(r => r.slice().reverse());
    }
    function rotateBack(m, dir) {
      if (dir === 'left') return m;
      if (dir === 'right') return m.map(r => r.slice().reverse());
      if (dir === 'up') return transpose(m);
      if (dir === 'down') return transpose(m.map(r => r.slice().reverse()));
    }
    function transpose(m) { return m[0].map((_, c) => m.map(r => r[c])); }

    function canMove() {
      if (empties().length) return true;
      for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
        const v = board[r][c];
        if (c < SIZE - 1 && board[r][c + 1] === v) return true;
        if (r < SIZE - 1 && board[r + 1][c] === v) return true;
      }
      return false;
    }

    function finish(title, text, btn) {
      ovTitle.textContent = title;
      ovText.textContent = text;
      document.getElementById('ovBtn').textContent = btn;
      overlay.classList.add('show');
      document.getElementById('ovBtn').onclick = () => {
        if (btn === 'Continuar') overlay.classList.remove('show');
        else init();
      };
    }

    window.addEventListener('keydown', e => {
      const map = { ArrowLeft: 'left', ArrowRight: 'right', ArrowUp: 'up', ArrowDown: 'down' };
      if (map[e.key]) { e.preventDefault(); move(map[e.key]); }
    });

    // swipe
    let ts = null;
    gridEl.addEventListener('touchstart', e => { ts = e.touches[0]; }, { passive: true });
    gridEl.addEventListener('touchend', e => {
      if (!ts) return;
      const t = e.changedTouches[0];
      const dx = t.clientX - ts.clientX, dy = t.clientY - ts.clientY;
      if (Math.max(Math.abs(dx), Math.abs(dy)) < 24) return;
      if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 'right' : 'left');
      else move(dy > 0 ? 'down' : 'up');
      ts = null;
    }, { passive: true });

    document.getElementById('newBtn').addEventListener('click', init);
    init();
  </script>
</body>
</html>
