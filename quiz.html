<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Relâmpago • Mini-Jogos</title>
  <meta name="description" content="Quiz Relâmpago: responda perguntas contra o tempo e faça a maior pontuação." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❓</text></svg>" />
  <style>
    .quiz { max-width: 620px; margin: 0 auto; }
    .progress {
      height: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
      margin-bottom: 1.4rem;
    }
    .progress > span {
      display: block;
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, var(--accent-2), var(--accent-3));
      transform-origin: left;
      transition: transform 0.1s linear;
    }
    .qnum { color: var(--muted); font-size: 0.85rem; letter-spacing: 0.05em; text-transform: uppercase; }
    .question { font-size: clamp(1.25rem, 4vw, 1.7rem); font-weight: 700; margin: 0.4rem 0 1.4rem; line-height: 1.3; }
    .options { display: grid; gap: 0.8rem; }
    .option {
      text-align: left;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 500;
      color: var(--text);
      padding: 1rem 1.2rem;
      border-radius: 14px;
      border: 1px solid var(--panel-border);
      background: var(--panel);
      cursor: pointer;
      transition: all 0.18s ease;
      display: flex;
      align-items: center;
      gap: 0.9rem;
    }
    .option .key {
      display: grid; place-items: center;
      width: 30px; height: 30px; flex: none;
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      font-weight: 700; font-size: 0.9rem;
    }
    .option:hover:not(:disabled) { border-color: var(--accent); transform: translateX(4px); }
    .option.correct { border-color: var(--good); background: rgba(52,224,161,0.14); }
    .option.wrong { border-color: var(--bad); background: rgba(255,92,122,0.14); }
    .option:disabled { cursor: default; }
    .timer-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem; }
    .timer { font-variant-numeric: tabular-nums; font-weight: 700; }
    .streak { color: var(--accent-2); font-size: 0.9rem; font-weight: 600; }
    .result-box { text-align: center; padding: 1rem; }
    .result-box .big { font-size: 3rem; font-weight: 800; }
    .result-box .msg { color: var(--muted); margin: 0.4rem 0 1.4rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <div class="brand"><span class="logo">❓</span><span>Mini<span class="grad">Jogos</span></span></div>
      <a class="back-link" href="index.html">&larr; Voltar ao arcade</a>
    </header>

    <div class="game-head">
      <h1>Quiz Relâmpago</h1>
      <p>Responda antes do tempo acabar. Acertos rápidos e sequências valem mais pontos!</p>
    </div>

    <div class="hud">
      <div class="stat"><span class="label">Pontos</span><span class="value" id="score">0</span></div>
      <div class="stat"><span class="label">Acertos</span><span class="value" id="hits">0</span></div>
      <div class="stat"><span class="label">Recorde</span><span class="value" id="best">0</span></div>
    </div>

    <div class="panel quiz">
      <div id="playView">
        <div class="progress"><span id="bar"></span></div>
        <div class="timer-row">
          <span class="qnum" id="qnum">Pergunta 1</span>
          <span class="timer" id="timer">15s</span>
        </div>
        <div class="question" id="question">…</div>
        <div class="options" id="options"></div>
        <div class="streak" id="streak" style="margin-top:1rem;">&nbsp;</div>
      </div>

      <div id="endView" style="display:none;">
        <div class="result-box">
          <div class="big" id="finalScore">0</div>
          <p class="msg" id="finalMsg"></p>
          <button class="btn" id="restartBtn">Jogar de novo</button>
        </div>
      </div>
    </div>

    <div class="controls">
      <a class="btn ghost" href="index.html">Outro jogo</a>
    </div>

    <footer class="foot"><p>Você pode responder pelo teclado: teclas 1–4 ou A–D.</p></footer>
  </div>

  <script>
    const QUESTIONS = [
      { q: "Qual é o maior planeta do Sistema Solar?", opts: ["Terra", "Júpiter", "Saturno", "Marte"], a: 1 },
      { q: "Quantos lados tem um hexágono?", opts: ["5", "6", "7", "8"], a: 1 },
      { q: "Em que continente fica o Egito?", opts: ["Ásia", "Europa", "África", "Oceania"], a: 2 },
      { q: "Qual é o resultado de 9 × 7?", opts: ["56", "63", "72", "49"], a: 1 },
      { q: "Quem pintou a Mona Lisa?", opts: ["Van Gogh", "Picasso", "Da Vinci", "Michelangelo"], a: 2 },
      { q: "Qual gás as plantas absorvem na fotossíntese?", opts: ["Oxigênio", "Gás carbônico", "Nitrogênio", "Hidrogênio"], a: 1 },
      { q: "Qual é a capital do Japão?", opts: ["Pequim", "Seul", "Bangkok", "Tóquio"], a: 3 },
      { q: "Quantos ossos tem o corpo humano adulto?", opts: ["206", "180", "230", "150"], a: 0 },
      { q: "Qual é o oceano mais extenso da Terra?", opts: ["Atlântico", "Índico", "Ártico", "Pacífico"], a: 3 },
      { q: "Em que ano o homem pisou na Lua pela 1ª vez?", opts: ["1965", "1969", "1972", "1958"], a: 1 },
      { q: "Qual desses NÃO é um mamífero?", opts: ["Golfinho", "Morcego", "Tubarão", "Baleia"], a: 2 },
      { q: "Qual é a moeda oficial do Brasil?", opts: ["Peso", "Real", "Dólar", "Euro"], a: 1 }
    ];

    const TIME = 15;          // segundos por pergunta
    const TOTAL = 8;          // perguntas por partida
    const BEST_KEY = 'minijogos.quiz.best';

    const els = {
      score: document.getElementById('score'),
      hits: document.getElementById('hits'),
      best: document.getElementById('best'),
      qnum: document.getElementById('qnum'),
      question: document.getElementById('question'),
      options: document.getElementById('options'),
      timer: document.getElementById('timer'),
      bar: document.getElementById('bar'),
      streak: document.getElementById('streak'),
      play: document.getElementById('playView'),
      end: document.getElementById('endView'),
      finalScore: document.getElementById('finalScore'),
      finalMsg: document.getElementById('finalMsg')
    };

    let pool, idx, score, hits, streak, remaining, tick, answered;

    els.best.textContent = localStorage.getItem(BEST_KEY) || '0';

    function shuffle(a) {
      a = a.slice();
      for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
      return a;
    }

    function start() {
      pool = shuffle(QUESTIONS).slice(0, TOTAL);
      idx = 0; score = 0; hits = 0; streak = 0;
      els.score.textContent = '0';
      els.hits.textContent = '0';
      els.end.style.display = 'none';
      els.play.style.display = '';
      show();
    }

    function show() {
      answered = false;
      const item = pool[idx];
      els.qnum.textContent = `Pergunta ${idx + 1} de ${TOTAL}`;
      els.question.textContent = item.q;
      els.streak.innerHTML = streak > 1 ? `🔥 Sequência de ${streak}!` : '&nbsp;';
      els.options.innerHTML = '';
      const letters = ['A', 'B', 'C', 'D'];
      item.opts.forEach((opt, i) => {
        const b = document.createElement('button');
        b.className = 'option';
        b.innerHTML = `<span class="key">${letters[i]}</span><span>${opt}</span>`;
        b.addEventListener('click', () => answer(i));
        els.options.appendChild(b);
      });
      // timer
      remaining = TIME;
      els.timer.textContent = TIME + 's';
      els.bar.style.transform = 'scaleX(1)';
      clearInterval(tick);
      const step = 100; // ms
      tick = setInterval(() => {
        remaining -= step / 1000;
        if (remaining <= 0) { remaining = 0; els.timer.textContent = '0s'; els.bar.style.transform = 'scaleX(0)'; timeUp(); return; }
        els.timer.textContent = Math.ceil(remaining) + 's';
        els.bar.style.transform = `scaleX(${remaining / TIME})`;
      }, step);
    }

    function answer(i) {
      if (answered) return;
      answered = true;
      clearInterval(tick);
      const item = pool[idx];
      const btns = els.options.querySelectorAll('.option');
      btns.forEach(b => b.disabled = true);
      btns[item.a].classList.add('correct');
      if (i === item.a) {
        const bonus = Math.round(remaining * 10);      // até 150 por rapidez
        streak++;
        const streakBonus = (streak - 1) * 25;
        score += 100 + bonus + streakBonus;
        hits++;
        els.score.textContent = score;
        els.hits.textContent = hits;
      } else {
        btns[i].classList.add('wrong');
        streak = 0;
      }
      setTimeout(next, 1000);
    }

    function timeUp() {
      if (answered) return;
      answered = true;
      streak = 0;
      const item = pool[idx];
      const btns = els.options.querySelectorAll('.option');
      btns.forEach(b => b.disabled = true);
      btns[item.a].classList.add('correct');
      setTimeout(next, 1000);
    }

    function next() {
      idx++;
      if (idx >= TOTAL) return end();
      show();
    }

    function end() {
      clearInterval(tick);
      els.play.style.display = 'none';
      els.end.style.display = '';
      els.finalScore.textContent = score;
      const prev = parseInt(localStorage.getItem(BEST_KEY) || '0', 10);
      let record = '';
      if (score > prev) { localStorage.setItem(BEST_KEY, score); els.best.textContent = score; record = ' 🏆 Novo recorde!'; }
      let grade;
      if (hits === TOTAL) grade = 'Perfeito! Gabaritou! 🌟';
      else if (hits >= TOTAL * 0.75) grade = 'Excelente! 👏';
      else if (hits >= TOTAL * 0.5) grade = 'Muito bem! 🙂';
      else grade = 'Continue praticando! 💪';
      els.finalMsg.textContent = `${hits} de ${TOTAL} acertos. ${grade}${record}`;
    }

    window.addEventListener('keydown', e => {
      if (els.play.style.display === 'none') return;
      const byNum = { '1': 0, '2': 1, '3': 2, '4': 3 };
      const byLet = { a: 0, b: 1, c: 2, d: 3, A: 0, B: 1, C: 2, D: 3 };
      const i = byNum[e.key] ?? byLet[e.key];
      if (i !== undefined) answer(i);
    });

    document.getElementById('restartBtn').addEventListener('click', start);
    start();
  </script>
</body>
</html>
